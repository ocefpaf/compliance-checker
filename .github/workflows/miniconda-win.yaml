name: windows

on:
  pull_request:
  push:
    branches: [master]

jobs:
  strategy:
    fail-fast: false
    matrix:
      os: ["macos-latest", "windows-latest"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v2
        with:
          python-version: 3.8
          channels: conda-forge
          channel-priority: true
